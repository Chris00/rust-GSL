<script

<script

<script>
  (function () {
    "use strict";

    document.addEventListener("DOMContentLoaded", function () {
      renderMathInElement(document.body, {
          delimiters: [
              { left: "$$", right: "$$", display: true },
              { left: "$", right: "$", display: false },
          ],
	  macros: {
	      "·": "\\cdot",
	      "⋯": "\\cdots",
	      "′": "{}^\\prime",  // ' is not tolerated
	      "α": "\\alpha",
	      "β": "\\beta",
	      "ε": "\\epsilon",
	      "μ": "\\mu",
 	      "ν": "\\nu",
	      "σ": "\\sigma",
 	      "ω": "\\omega",
	      "∞": "\\infty",
	      "‖": "\\|",
	      "√": "\\sqrt",
	      "∑": "\\sum",
	      "≈": "\\approx",
	      "×": "\\times",
	      "∈": "\\in",
	      "→": "\\to",
	      "∂": "\\partial",
	      "∫": "\\int",
	      "⌊": "\\lfloor",
	      "⌋": "\\rfloor",
	      "⟨": "\\langle",
	      "⟩": "\\rangle",
	      "≪": "\\,\\verb/<</\\,",
	      "≫": "\\,\\verb/>>/\\,",
	      "\\land": "\\,\\verb/&/\\,",
	      "\\d": "\\, \\text{d}", // "d" for integrals
	      "\\Ran": "\\text{Ran}",
	      "\\e": "\\text{e}",
	      "\\lcm": "\\text{lcm}",
	      "\\Ai": "\\text{Ai}",
	      "\\Bi": "\\text{Bi}",
	      "\\ce": "\\text{ce}",
	      "\\se": "\\text{se}",
	      "\\Mc": "\\text{Mc}",
              "\\Ms": "\\text{Ms}",
              "\\cn": "\\text{cn}",
              "\\dn": "\\text{dn}",
              "\\sn": "\\text{sn}",
	      "\\RESULT": "\\text{RESULT}",
	      "\\tol": "\\text{tol}",
	      "\\TOL": "\\text{TOL}",
	      "\\xtol": "\\text{xtol}",
	      "\\gtol": "\\text{gtol}",
	      "\\ABSERR": "\\text{ABSERR}",
	      "\\epsabs": "\\texttt{epsabs}",
	      "\\epsrel": "\\texttt{epsrel}",
              "\\abserr": "\\texttt{abserr}",
              "\\stepsize": "\\texttt{stepsize}",
              "\\Var": "\\text{Var}",
              "\\cov": "\\text{cov}",
              "\\diag": "\\text{diag}",
              "\\rcond": "\\text{rcond}",
	  },
	  strict: true,
      });
    });
  })();
</script>
